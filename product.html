<link rel="stylesheet" href="style.css">
<style>
.product-detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:4rem; align-items:start; }
.product-images { position:sticky; top:calc(var(--nav-h)+1.5rem); }
.main-img {
  width:100%; aspect-ratio:1; border-radius:20px;
  display:flex; align-items:center; justify-content:center;
  font-size:6rem; overflow:hidden; transition:background 0.4s;
  position:relative;
}
.img-thumbnails { display:flex; gap:0.8rem; margin-top:1rem; }
.thumb { width:70px; height:70px; border-radius:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:1.8rem; border:2px solid transparent; transition:all 0.2s; flex-shrink:0; opacity:0.6; }
.thumb.active { border-color:var(--sage); opacity:1; transform:scale(1.05); }
.thumb:hover { opacity:1; }
.product-title { font-family:'Cormorant Garamond',serif; font-size:clamp(2rem,3vw,2.8rem); font-weight:300; color:var(--forest); margin-bottom:0.4rem; line-height:1.2; }
.product-herb-detail { font-size:0.85rem; color:var(--sage); font-style:italic; margin-bottom:0.8rem; }
.product-category-tag { display:inline-block; background:var(--parchment); border:1px solid rgba(90,122,74,0.2); border-radius:50px; padding:0.25rem 0.9rem; font-size:0.7rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--sage); font-weight:500; margin-bottom:1.2rem; }
.product-detail-price { font-family:'Cormorant Garamond',serif; font-size:2.4rem; font-weight:600; color:var(--forest); margin-bottom:0.4rem; }
.product-detail-price span { font-size:1rem; font-family:'DM Sans'; color:var(--bark); }
.stock-indicator { display:inline-flex; align-items:center; gap:0.4rem; font-size:0.83rem; margin-bottom:1.5rem; padding:0.35rem 0.9rem; border-radius:50px; }
.stock-indicator.in { background:rgba(90,122,74,0.12); color:var(--sage); }
.stock-indicator.out { background:rgba(200,60,60,0.1); color:#cc4444; }
.benefits-list { list-style:none; margin:1.5rem 0; }
.benefits-list li { display:flex; align-items:center; gap:0.6rem; font-size:0.85rem; color:var(--earth); padding:0.35rem 0; }
.benefits-list li::before { content:'✓'; color:var(--sage); font-weight:700; font-size:0.9rem; }
.qty-add-row { display:flex; align-items:center; gap:1rem; margin-top:1.5rem; flex-wrap:wrap; }
.qty-stepper { display:flex; align-items:center; gap:0; border:1.5px solid rgba(90,122,74,0.25); border-radius:50px; overflow:hidden; }
.qty-stepper button { width:38px; height:38px; border:none; background:transparent; font-size:1.1rem; cursor:pointer; color:var(--forest); transition:background 0.2s; }
.qty-stepper button:hover { background:rgba(90,122,74,0.1); }
.qty-stepper span { padding:0 1rem; font-size:1rem; font-weight:500; min-width:40px; text-align:center; }
.whatsapp-order { display:inline-flex; align-items:center; gap:0.5rem; background:#25D366; color:white; padding:0.8rem 1.5rem; border-radius:50px; font-size:0.82rem; text-decoration:none; font-weight:600; transition:all 0.2s; border:none; cursor:pointer; font-family:'DM Sans'; }
.whatsapp-order:hover { background:#20c05a; }
.product-tabs { border-bottom:1px solid rgba(90,122,74,0.15); margin-top:2.5rem; margin-bottom:2rem; display:flex; gap:0; }
.tab-btn { padding:0.8rem 1.5rem; border:none; background:transparent; font-family:'DM Sans'; font-size:0.85rem; color:var(--bark); cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s; }
.tab-btn.active { color:var(--sage); border-bottom-color:var(--sage); }
.tab-content { display:none; }
.tab-content.active { display:block; }
.tab-content p { font-size:0.9rem; line-height:1.85; color:rgba(26,46,26,0.72); }

/* Reviews */
.review-card { background:var(--parchment); border-radius:12px; padding:1.2rem; margin-bottom:1rem; }
.reviewer-row { display:flex; align-items:center; gap:0.7rem; margin-bottom:0.6rem; }
.reviewer-avatar { width:36px; height:36px; border-radius:50%; background:var(--sage); display:flex; align-items:center; justify-content:center; color:white; font-size:0.85rem; font-weight:600; flex-shrink:0; }
.review-name { font-size:0.85rem; font-weight:500; color:var(--forest); }
.review-date { font-size:0.72rem; color:var(--bark); }
.review-text { font-size:0.85rem; color:var(--earth); line-height:1.65; font-style:italic; }

/* Suggested */
.suggested-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1.5rem; margin-top:2rem; }

@media(max-width:800px) {
  .product-detail-grid { grid-template-columns:1fr; gap:2rem; }
  .product-images { position:static; }
  .suggested-grid { grid-template-columns:1fr 1fr; }
}
@media(max-width:500px) { .suggested-grid { grid-template-columns:1fr; } }
</style>

<body>
<div id="nav-placeholder"></div>

<div class="page-content" style="padding-top:calc(var(--nav-h) + 2rem)">
  <div style="padding:0 6vw 0.5rem">
    <div class="breadcrumb"><a href="index.html">Home</a> / <a href="products.html">Products</a> / <span id="breadcrumb-name">Product</span></div>
  </div>
  <section class="section" style="padding-top:1rem">
    <div class="product-detail-grid" id="product-detail"></div>
  </section>
  <section class="section section-parchment">
    <div class="section-tag">You May Also Like</div>
    <h2 class="section-title">Suggested <em>Products</em></h2>
    <div class="suggested-grid" id="suggested-products"></div>
  </section>
</div>

<div id="footer-placeholder"></div>
<div id="chatbot-placeholder"></div>
<div id="toast">✅ Added to cart!</div>

<script src="images.js"></script>
<script src="shared.js"></script>
<script>
document.getElementById('nav-placeholder').innerHTML = renderHeader('Products');
document.getElementById('footer-placeholder').innerHTML = renderFooter();
document.getElementById('chatbot-placeholder').innerHTML = renderChatbot();
updateCartBadge();

const params = new URLSearchParams(location.search);
const productId = parseInt(params.get('id')) || 1;
let currentQty = 1;
let selectedImg = 0;

function loadProduct() {
  const products = initProducts ? initProducts() : getProducts();
  const p = products.find(x => x.id === productId);
  if(!p) { document.getElementById('product-detail').innerHTML='<p>Product not found.</p>'; return; }
  document.title = p.name + ' — Sefa Organic';
  document.getElementById('breadcrumb-name').textContent = p.name;
  
  // Use real product images if available, else color fallback
  const hasImgs = p.images && p.images.length > 0;
  const imgSlots = hasImgs ? [...p.images] : [];
  while(imgSlots.length < 4) imgSlots.push(null);
  const colors = [p.color, adjustColor(p.color, 30), adjustColor(p.color, -20), adjustColor(p.color, 15)];
  const icons = ['🌿','🌱','🍃','✨'];
  
  const starsHTML = '★'.repeat(5);
  const avgRating = p.reviews && p.reviews.length ? (p.reviews.reduce((a,r)=>a+r.rating,0)/p.reviews.length).toFixed(1) : '5.0';
  
  document.getElementById('product-detail').innerHTML = `
    <div class="product-images reveal-left">
      <div class="main-img" id="main-img" style="background:${colors[0]};font-size:6rem;${imgSlots[0]?'padding:0;':''}">
        ${imgSlots[0] ? `<img id="main-img-el" src="${imgSlots[0]}" style="width:100%;height:100%;object-fit:cover;border-radius:20px">` : '<span id="main-icon">🌿</span>'}
        ${!p.inStock ? '<div style="position:absolute;top:1rem;right:1rem;background:#cc4444;color:white;padding:0.4rem 1rem;border-radius:50px;font-size:0.8rem;font-weight:600;z-index:2">Out of Stock</div>' : ''}
      </div>
      <div class="img-thumbnails">
        ${imgSlots.map((img,i)=>img
          ? `<div class="thumb ${i===0?'active':''}" onclick="switchImgReal(${i},'${img}','${colors[i]}')" style="background:${colors[i]};overflow:hidden"><img src="${img}" style="width:100%;height:100%;object-fit:cover"></div>`
          : `<div class="thumb" onclick="switchImg(${i},'${colors[i]}','${icons[i]}')" style="background:${colors[i]}">${icons[i]}</div>`
        ).join('')}
      </div>
    </div>
    <div class="reveal-right">
      <span class="product-category-tag">${p.category}</span>
      <h1 class="product-title">${p.name}</h1>
      <div class="product-herb-detail"><em>${p.herb}</em></div>
      <div style="display:flex;align-items:center;gap:0.6rem;margin-bottom:0.8rem">
        <span class="stars">${starsHTML}</span>
        <span style="font-size:0.8rem;color:var(--bark)">${avgRating} / 5 (${p.reviews?p.reviews.length:0} reviews)</span>
      </div>
      <div class="product-detail-price">UGX ${p.price.toLocaleString()} <span>/ ${p.unit}</span></div>
      <div class="stock-indicator ${p.inStock?'in':'out'}">${p.inStock?'⬤ In Stock — '+p.stockQty+' available':'⬤ Out of Stock'}</div>
      <p style="font-size:0.9rem;line-height:1.85;color:rgba(26,46,26,0.72)">${p.description}</p>
      <ul class="benefits-list">
        ${(p.benefits||[]).map(b=>`<li>${b}</li>`).join('')}
      </ul>
      ${p.inStock ? `
      <div class="qty-add-row">
        <div class="qty-stepper">
          <button onclick="changeQty(-1)">−</button>
          <span id="qty-display">1</span>
          <button onclick="changeQty(1)">+</button>
        </div>
        <button class="btn-primary" onclick="addProductToCart(${p.id})">Add to Cart</button>
        <a href="https://wa.me/256772443187?text=Hello%20Sefa%20Organic!%20I%20want%20to%20order%20${encodeURIComponent(p.name)}%20x1.%20Please%20assist." class="whatsapp-order" target="_blank">
          <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.558 4.122 1.535 5.858L.057 23.786a.5.5 0 00.609.63l6.085-1.595A11.94 11.94 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.907 0-3.693-.505-5.232-1.386l-.374-.22-3.876 1.016 1.033-3.77-.243-.386A9.937 9.937 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
          WhatsApp Order
        </a>
      </div>` : '<p style="color:#cc4444;font-weight:500">This product is currently out of stock. <a href="contact.html" style="color:var(--sage)">Contact us</a> to be notified when it returns.</p>'}
      
      <div class="product-tabs">
        <button class="tab-btn active" onclick="switchTab('description', this)">Description</button>
        <button class="tab-btn" onclick="switchTab('reviews', this)">Reviews (${p.reviews?p.reviews.length:0})</button>
        <button class="tab-btn" onclick="switchTab('usage', this)">How to Use</button>
      </div>
      <div id="tab-description" class="tab-content active">
        <p>${p.description}</p>
        <p style="margin-top:1rem">All Sefa Organic products are made from 100% natural Ugandan herbs, tested in our certified laboratory, and formulated by qualified pharmacists. Free from artificial additives, preservatives, and synthetic compounds.</p>
      </div>
      <div id="tab-reviews" class="tab-content">
        ${(p.reviews||[]).map(r=>`
        <div class="review-card">
          <div class="reviewer-row">
            <div class="reviewer-avatar">${r.name.charAt(0)}</div>
            <div><div class="review-name">${r.name}</div><div class="review-date">${r.date}</div></div>
            <div class="stars" style="margin-left:auto">${'★'.repeat(r.rating)}</div>
          </div>
          <p class="review-text">"${r.text}"</p>
        </div>`).join('')}
        ${!p.reviews||p.reviews.length===0?'<p>No reviews yet. Be the first to review this product!</p>':''}
      </div>
      <div id="tab-usage" class="tab-content">
        <p>Take as directed on the product label. For capsules: take 1–2 capsules with water after meals. For tonics and syrups: take 20–30ml twice daily or as directed by your healthcare provider.</p>
        <p style="margin-top:1rem"><strong>Important:</strong> This product is a natural supplement and is not intended to replace prescribed medication. Consult your doctor if you have a medical condition or are on medication.</p>
      </div>
    </div>
  `;
  
  // Suggested products
  const suggested = products.filter(x=>x.id!==productId).slice(0,3);
  document.getElementById('suggested-products').innerHTML = suggested.map(s=>`
    <div class="product-card reveal" onclick="location.href='product.html?id=${s.id}'">
      <div class="product-img-block" style="background:${s.color};cursor:pointer;">
        <div style="font-size:3rem;color:rgba(255,255,255,0.3)">🌿</div>
      </div>
      <div class="product-info">
        <h3>${s.name}</h3>
        <div class="product-herb-tag">${s.herb}</div>
        <div class="product-footer">
          <div class="product-price">UGX ${s.price.toLocaleString()} <span>/ ${s.unit}</span></div>
        </div>
        <a href="product.html?id=${s.id}" class="view-btn" style="margin-top:0.7rem">View Product →</a>
      </div>
    </div>
  `).join('');
  
  initReveal();
}

function adjustColor(hex, amount) {
  // Simple color adjustment
  const h = hex.replace('#','');
  const r = Math.max(0,Math.min(255,parseInt(h.slice(0,2),16)+amount));
  const g = Math.max(0,Math.min(255,parseInt(h.slice(2,4),16)+amount));
  const b = Math.max(0,Math.min(255,parseInt(h.slice(4,6),16)+amount));
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function switchImg(idx, color, icon) {
  const mainImg = document.getElementById('main-img');
  mainImg.style.background = color;
  const mainEl = document.getElementById('main-img-el');
  const mainIcon = document.getElementById('main-icon');
  if(mainEl) mainEl.remove();
  if(mainIcon) mainIcon.textContent = icon;
  document.querySelectorAll('.thumb').forEach((t,i)=>t.classList.toggle('active',i===idx));
}
function switchImgReal(idx, imgSrc, color) {
  const mainImg = document.getElementById('main-img');
  mainImg.style.background = color;
  let mainEl = document.getElementById('main-img-el');
  if(!mainEl) {
    mainEl = document.createElement('img');
    mainEl.id = 'main-img-el';
    mainEl.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:20px;position:absolute;inset:0;';
    mainImg.appendChild(mainEl);
  }
  mainEl.src = imgSrc;
  document.querySelectorAll('.thumb').forEach((t,i)=>t.classList.toggle('active',i===idx));
}

function changeQty(delta) {
  currentQty = Math.max(1, Math.min(99, currentQty + delta));
  document.getElementById('qty-display').textContent = currentQty;
}

function addProductToCart(id) {
  addToCart(id, currentQty);
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'), 2500);
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
}

loadProduct();
</script>
</body>
</html>
