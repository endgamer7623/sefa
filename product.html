<style>
.product-detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:4rem; align-items:start; }
.product-images { position:sticky; top:calc(var(--nav-h)+1.5rem); }
.main-img {
  width:100%; aspect-ratio:1; border-radius:20px;
  display:flex; align-items:center; justify-content:center;
  font-size:6rem; overflow:hidden; transition:background 0.4s;
  position:relative;
}
.img-thumbnails { display:flex; gap:0.8rem; margin-top:1rem; }
.thumb { width:70px; height:70px; border-radius:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:1.8rem; border:2px solid transparent; transition:all 0.2s; flex-shrink:0; opacity:0.6; }
.thumb.active { border-color:var(--sage); opacity:1; transform:scale(1.05); }
.thumb:hover { opacity:1; }
.product-title { font-family:'Cormorant Garamond',serif; font-size:clamp(2rem,3vw,2.8rem); font-weight:300; color:var(--forest); margin-bottom:0.4rem; line-height:1.2; }
.product-herb-detail { font-size:0.85rem; color:var(--sage); font-style:italic; margin-bottom:0.8rem; }
.product-category-tag { display:inline-block; background:var(--parchment); border:1px solid rgba(90,122,74,0.2); border-radius:50px; padding:0.25rem 0.9rem; font-size:0.7rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--sage); font-weight:500; margin-bottom:1.2rem; }
.product-detail-price { font-family:'Cormorant Garamond',serif; font-size:2.4rem; font-weight:600; color:var(--forest); margin-bottom:0.4rem; }
.product-detail-price span { font-size:1rem; font-family:'DM Sans'; color:var(--bark); }
.stock-indicator { display:inline-flex; align-items:center; gap:0.4rem; font-size:0.83rem; margin-bottom:1.5rem; padding:0.35rem 0.9rem; border-radius:50px; }
.stock-indicator.in { background:rgba(90,122,74,0.12); color:var(--sage); }
.stock-indicator.out { background:rgba(200,60,60,0.1); color:#cc4444; }
.benefits-list { list-style:none; margin:1.5rem 0; }
.benefits-list li { display:flex; align-items:center; gap:0.6rem; font-size:0.85rem; color:var(--earth); padding:0.35rem 0; }
.benefits-list li::before { content:'✓'; color:var(--sage); font-weight:700; font-size:0.9rem; }
.qty-add-row { display:flex; align-items:center; gap:1rem; margin-top:1.5rem; flex-wrap:wrap; }
.qty-stepper { display:flex; align-items:center; gap:0; border:1.5px solid rgba(90,122,74,0.25); border-radius:50px; overflow:hidden; }
.qty-stepper button { width:38px; height:38px; border:none; background:transparent; font-size:1.1rem; cursor:pointer; color:var(--forest); transition:background 0.2s; }
.qty-stepper button:hover { background:rgba(90,122,74,0.1); }
.qty-stepper span { padding:0 1rem; font-size:1rem; font-weight:500; min-width:40px; text-align:center; }
.whatsapp-order { display:inline-flex; align-items:center; gap:0.5rem; background:#25D366; color:white; padding:0.8rem 1.5rem; border-radius:50px; font-size:0.82rem; text-decoration:none; font-weight:600; transition:all 0.2s; border:none; cursor:pointer; font-family:'DM Sans'; }
.whatsapp-order:hover { background:#20c05a; }
.product-tabs { border-bottom:1px solid rgba(90,122,74,0.15); margin-top:2.5rem; margin-bottom:2rem; display:flex; gap:0; }
.tab-btn { padding:0.8rem 1.5rem; border:none; background:transparent; font-family:'DM Sans'; font-size:0.85rem; color:var(--bark); cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s; }
.tab-btn.active { color:var(--sage); border-bottom-color:var(--sage); }
.tab-content { display:none; }
.tab-content.active { display:block; }
.tab-content p { font-size:0.9rem; line-height:1.85; color:rgba(26,46,26,0.72); }

/* Reviews */
.review-card { background:var(--parchment); border-radius:12px; padding:1.2rem; margin-bottom:1rem; }
.reviewer-row { display:flex; align-items:center; gap:0.7rem; margin-bottom:0.6rem; }
.reviewer-avatar { width:36px; height:36px; border-radius:50%; background:var(--sage); display:flex; align-items:center; justify-content:center; color:white; font-size:0.85rem; font-weight:600; flex-shrink:0; }
.review-name { font-size:0.85rem; font-weight:500; color:var(--forest); }
.review-date { font-size:0.72rem; color:var(--bark); }
.review-text { font-size:0.85rem; color:var(--earth); line-height:1.65; font-style:italic; }

/* Suggested */
.suggested-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1.5rem; margin-top:2rem; }

@media(max-width:800px) {
  .product-detail-grid { grid-template-columns:1fr; gap:2rem; }
  .product-images { position:static; }
  .suggested-grid { grid-template-columns:1fr 1fr; }
}
@media(max-width:500px) { .suggested-grid { grid-template-columns:1fr; } }
</style>
</head>

let currentQty = 1;

function adjustColor(hex, amount) {
  // Simple color adjustment
  const h = hex.replace('#','');
  const r = Math.max(0,Math.min(255,parseInt(h.slice(0,2),16)+amount));
  const g = Math.max(0,Math.min(255,parseInt(h.slice(2,4),16)+amount));
  const b = Math.max(0,Math.min(255,parseInt(h.slice(4,6),16)+amount));
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function switchImg(idx, color, icon) {
  document.getElementById('main-img').style.background = color;
  document.getElementById('main-icon').textContent = icon;
  document.querySelectorAll('.thumb').forEach((t,i)=>t.classList.toggle('active',i===idx));
}

function changeQty(delta) {
  currentQty = Math.max(1, Math.min(99, currentQty + delta));
  document.getElementById('qty-display').textContent = currentQty;
}

function addProductToCart(id) {
  addToCart(id, currentQty);
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'), 2500);
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
}

loadProduct();
</script>
