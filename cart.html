<link rel="stylesheet" href="style.css">
<style>
.cart-layout { display:grid; grid-template-columns:1fr 340px; gap:2.5rem; align-items:start; }
.cart-items { background:var(--white); border-radius:16px; overflow:hidden; border:1px solid rgba(90,122,74,0.1); }
.cart-header-row { display:grid; grid-template-columns:2fr 1fr 1fr 1fr auto; gap:1rem; padding:1rem 1.5rem; background:var(--parchment); font-size:0.72rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--bark); font-weight:500; align-items:center; }
.cart-item-row { display:grid; grid-template-columns:2fr 1fr 1fr 1fr auto; gap:1rem; padding:1.2rem 1.5rem; border-top:1px solid rgba(90,122,74,0.08); align-items:center; transition:background 0.2s; }
.cart-item-row:hover { background:rgba(244,240,230,0.5); }
.cart-item-name { font-family:'Cormorant Garamond',serif; font-size:1.1rem; color:var(--forest); }
.cart-item-herb { font-size:0.73rem; color:var(--sage); font-style:italic; }
.cart-item-price { font-size:0.9rem; color:var(--earth); font-weight:500; }
.qty-ctrl { display:flex; align-items:center; gap:0; border:1px solid rgba(90,122,74,0.2); border-radius:50px; width:fit-content; }
.qty-ctrl button { width:30px; height:30px; border:none; background:transparent; cursor:pointer; font-size:1rem; color:var(--forest); transition:background 0.2s; border-radius:50%; }
.qty-ctrl button:hover { background:rgba(90,122,74,0.1); }
.qty-ctrl span { padding:0 0.5rem; font-size:0.9rem; min-width:28px; text-align:center; }
.item-total { font-family:'Cormorant Garamond',serif; font-size:1.1rem; font-weight:600; color:var(--forest); }
.remove-btn { width:28px; height:28px; border:none; background:transparent; cursor:pointer; color:#cc4444; border-radius:50%; display:flex; align-items:center; justify-content:center; transition:background 0.2s; font-size:1.1rem; }
.remove-btn:hover { background:rgba(200,60,60,0.1); }
.cart-empty { text-align:center; padding:5rem 2rem; }
.cart-empty-icon { font-size:4rem; margin-bottom:1rem; }
.cart-empty p { color:var(--bark); margin-bottom:1.5rem; }

.order-summary { background:var(--parchment); border-radius:16px; padding:2rem; position:sticky; top:calc(var(--nav-h)+1.5rem); }
.order-summary h3 { font-family:'Cormorant Garamond',serif; font-size:1.5rem; color:var(--forest); margin-bottom:1.5rem; }
.summary-row { display:flex; justify-content:space-between; align-items:center; padding:0.5rem 0; font-size:0.88rem; color:var(--earth); border-bottom:1px solid rgba(90,122,74,0.1); }
.summary-row.total { font-family:'Cormorant Garamond',serif; font-size:1.4rem; font-weight:600; color:var(--forest); border-bottom:none; padding-top:1rem; margin-top:0.5rem; }
.checkout-btn { display:block; width:100%; padding:1.1rem; background:var(--forest); color:var(--cream); border:none; border-radius:50px; font-family:'DM Sans'; font-size:0.9rem; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; margin-top:1.5rem; transition:background 0.2s; text-align:center; text-decoration:none; font-weight:500; }
.checkout-btn:hover { background:var(--sage); }
.continue-btn { display:block; text-align:center; margin-top:0.8rem; font-size:0.82rem; color:var(--sage); text-decoration:none; }
.continue-btn:hover { text-decoration:underline; }
@media(max-width:800px) {
  .cart-layout { grid-template-columns:1fr; }
  .order-summary { position:static; }
  .cart-header-row { display:none; }
  .cart-item-row { grid-template-columns:1fr auto; gap:0.5rem; }
  .cart-item-row > :not(:first-child):not(:last-child) { grid-column:1; }
}
</style>
</head>
<body>
<div id="nav-placeholder"></div>

<section class="cart-hero page-content">
  <div class="cart-hero-track"></div>
  <div class="cart-hero-inner">
    <div class="carthero-left">
      <div class="ch-breadcrumb"><a href="index.html">Home</a> › <span>Cart</span></div>
      <h1>Your<br><em>Cart</em></h1>
      <p>Review your selected items, adjust quantities and proceed to checkout.</p>
    </div>
    <div class="carthero-right">
      <div class="cart-hero-visual">
        <div class="chv-bag">🛒</div>
        <div class="chv-ring chv-r1"></div>
        <div class="chv-ring chv-r2"></div>
        <div class="chv-tag">Natural &amp; Organic</div>
      </div>
    </div>
  </div>
  <div class="ph-wave"><svg viewBox="0 0 1440 80" preserveAspectRatio="none"><path fill="#ede7d3" d="M0,20 C360,80 1080,0 1440,60 L1440,80 L0,80 Z"/></svg></div>
</section>
<style>
.cart-hero {
  background: linear-gradient(135deg, #1a2e1a 0%, #2d4a2d 60%, #1a3a25 100%);
  min-height:46vh; position:relative; overflow:hidden; display:flex; flex-direction:column; justify-content:flex-end;
}
.cart-hero-track {
  position:absolute; inset:0;
  background: repeating-linear-gradient(90deg, transparent 0px, transparent 60px, rgba(154,184,122,0.04) 60px, rgba(154,184,122,0.04) 61px),
              repeating-linear-gradient(0deg, transparent 0px, transparent 60px, rgba(154,184,122,0.04) 60px, rgba(154,184,122,0.04) 61px);
}
.cart-hero-inner { display:grid; grid-template-columns:1fr 1fr; gap:2rem; padding:calc(var(--nav-h)+2rem) 6vw 4rem; position:relative; z-index:2; align-items:center; }
.ch-breadcrumb { font-size:0.72rem; color:rgba(200,216,176,0.4); margin-bottom:1.2rem; }
.ch-breadcrumb a { color:rgba(200,216,176,0.4); text-decoration:none; }
.cart-hero h1 { font-family:'Cormorant Garamond',serif; font-size:clamp(3rem,5.5vw,5rem); font-weight:300; color:var(--cream); line-height:1.05; margin-bottom:1rem; animation:fadeUp 0.8s ease both; }
.cart-hero h1 em { color:var(--gold); font-style:italic; }
.cart-hero p { font-size:0.92rem; color:rgba(200,216,176,0.6); line-height:1.8; animation:fadeUp 0.8s 0.2s ease both; }
.carthero-right { display:flex; align-items:center; justify-content:center; }
.cart-hero-visual { position:relative; width:200px; height:200px; display:flex; align-items:center; justify-content:center; }
.chv-bag { font-size:5rem; animation:floatA 3s ease-in-out infinite; filter:drop-shadow(0 10px 30px rgba(0,0,0,0.3)); }
.chv-ring { position:absolute; border-radius:50%; border:1px solid rgba(154,184,122,0.2); }
.chv-r1 { width:140px; height:140px; animation:ringPulse 3s ease-in-out infinite; }
.chv-r2 { width:180px; height:180px; animation:ringPulse 3s 1s ease-in-out infinite; }
@keyframes ringPulse { 0%,100%{transform:scale(1);opacity:0.5} 50%{transform:scale(1.1);opacity:0.15} }
.chv-tag { position:absolute; bottom:-10px; right:-20px; background:var(--gold); color:var(--forest); padding:0.4rem 1rem; border-radius:50px; font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; animation:floatB 4s ease-in-out infinite; }
@media(max-width:800px) { .cart-hero-inner{grid-template-columns:1fr;} .carthero-right{display:none;} }
</style>

<section class="section">
  <div class="cart-layout">
    <div>
      <div id="cart-container"></div>
    </div>
    <div class="order-summary" id="order-summary">
      <h3>Order Summary</h3>
      <div id="summary-rows"></div>
      <div class="summary-row total"><span>Total</span><span id="cart-total">UGX 0</span></div>
      <a href="checkout.html" class="checkout-btn" id="checkout-btn">Proceed to Checkout</a>
      <a href="products.html" class="continue-btn">← Continue Shopping</a>
    </div>
  </div>
</section>

<div id="footer-placeholder"></div>
<div id="chatbot-placeholder"></div>

<script src="images.js"></script>
<script src="shared.js"></script>
<script>
document.getElementById('nav-placeholder').innerHTML = renderHeader('');
document.getElementById('footer-placeholder').innerHTML = renderFooter();
document.getElementById('chatbot-placeholder').innerHTML = renderChatbot();
updateCartBadge();

function renderCart() {
  const cart = getCart();
  const container = document.getElementById('cart-container');
  const products = initProducts ? initProducts() : getProducts();
  
  if(cart.length === 0) {
    container.innerHTML = `
      <div class="cart-items">
        <div class="cart-empty">
          <div class="cart-empty-icon">🛒</div>
          <h3 style="font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:var(--forest);margin-bottom:0.5rem">Your cart is empty</h3>
          <p>Discover our range of natural herbal remedies and add some to your cart.</p>
          <a href="products.html" class="btn-primary">Browse Products</a>
        </div>
      </div>`;
    document.getElementById('summary-rows').innerHTML = '';
    document.getElementById('cart-total').textContent = 'UGX 0';
    document.getElementById('checkout-btn').style.opacity = '0.4';
    document.getElementById('checkout-btn').style.pointerEvents = 'none';
    return;
  }
  
  document.getElementById('checkout-btn').style.opacity = '';
  document.getElementById('checkout-btn').style.pointerEvents = '';
  
  let subtotal = 0;
  cart.forEach(item => { subtotal += item.price * item.qty; });
  
  container.innerHTML = `
    <div class="cart-items">
      <div class="cart-header-row">
        <div>Product</div><div>Price</div><div>Quantity</div><div>Total</div><div></div>
      </div>
      ${cart.map(item => `
        <div class="cart-item-row">
          <div>
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-herb">per ${item.unit}</div>
          </div>
          <div class="cart-item-price">UGX ${item.price.toLocaleString()}</div>
          <div>
            <div class="qty-ctrl">
              <button onclick="updateQty(${item.id}, -1)">−</button>
              <span>${item.qty}</span>
              <button onclick="updateQty(${item.id}, 1)">+</button>
            </div>
          </div>
          <div class="item-total">UGX ${(item.price * item.qty).toLocaleString()}</div>
          <button class="remove-btn" onclick="removeItem(${item.id})" title="Remove">✕</button>
        </div>
      `).join('')}
    </div>`;
  
  document.getElementById('summary-rows').innerHTML = `
    ${cart.map(item => `<div class="summary-row"><span>${item.name} x${item.qty}</span><span>UGX ${(item.price*item.qty).toLocaleString()}</span></div>`).join('')}
    <div class="summary-row"><span>Delivery</span><span style="color:var(--sage)">Calculated at checkout</span></div>
  `;
  document.getElementById('cart-total').textContent = 'UGX ' + subtotal.toLocaleString();
}

function updateQty(id, delta) {
  const cart = getCart();
  const item = cart.find(i=>i.id===id);
  if(!item) return;
  item.qty = Math.max(1, item.qty + delta);
  saveCart(cart);
  renderCart();
}

function removeItem(id) {
  let cart = getCart();
  cart = cart.filter(i => i.id !== id);
  saveCart(cart);
  renderCart();
}

renderCart();
</script>
</body>
</html>
